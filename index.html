<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bird Hunter — QA Checklist</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root,[data-theme="light"]{
  --color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#fbfbf9;
  --color-surface-offset:#f3f0ec;--color-divider:#dcd9d5;--color-border:#d4d1ca;
  --color-text:#28251d;--color-text-muted:#7a7974;--color-text-faint:#bab9b4;
  --color-primary:#01696f;--color-primary-hover:#0c4e54;
  --color-success:#437a22;--color-error:#a12c7b;--color-warning:#964219;
  --color-gold:#d19900;
  --shadow-sm:0 1px 2px oklch(0.2 0.01 80/0.06);
  --shadow-md:0 4px 12px oklch(0.2 0.01 80/0.08);
  --radius-sm:0.375rem;--radius-md:0.5rem;--radius-lg:0.75rem;--radius-xl:1rem;--radius-full:9999px;
  --font-body:'Satoshi',sans-serif;
  --text-xs:clamp(0.75rem,0.7rem + 0.25vw,0.875rem);
  --text-sm:clamp(0.875rem,0.8rem + 0.35vw,1rem);
  --text-base:clamp(1rem,0.95rem + 0.25vw,1.125rem);
  --text-lg:clamp(1.125rem,1rem + 0.75vw,1.5rem);
  --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
  --space-1:0.25rem;--space-2:0.5rem;--space-3:0.75rem;--space-4:1rem;
  --space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;
  --space-12:3rem;--space-16:4rem;
}
[data-theme="dark"]{
  --color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#201f1d;
  --color-surface-offset:#1d1c1a;--color-divider:#262523;--color-border:#393836;
  --color-text:#cdccca;--color-text-muted:#797876;--color-text-faint:#5a5957;
  --color-primary:#4f98a3;--color-primary-hover:#227f8b;
  --color-success:#6daa45;--color-error:#d163a7;--color-warning:#bb653b;
  --color-gold:#e8af34;
  --shadow-sm:0 1px 2px oklch(0 0 0/0.2);--shadow-md:0 4px 12px oklch(0 0 0/0.3);
}
@media(prefers-color-scheme:dark){:root:not([data-theme]){
  --color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#201f1d;
  --color-surface-offset:#1d1c1a;--color-divider:#262523;--color-border:#393836;
  --color-text:#cdccca;--color-text-muted:#797876;--color-text-faint:#5a5957;
  --color-primary:#4f98a3;--color-primary-hover:#227f8b;
  --color-success:#6daa45;--color-error:#d163a7;--color-warning:#bb653b;
  --color-gold:#e8af34;
  --shadow-sm:0 1px 2px oklch(0 0 0/0.2);--shadow-md:0 4px 12px oklch(0 0 0/0.3);
}}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);color:var(--color-text);background:var(--color-bg);line-height:1.6}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
.app{display:grid;grid-template-rows:auto 1fr;min-height:100dvh}
header{position:sticky;top:0;z-index:100;background:var(--color-surface);border-bottom:1px solid var(--color-divider);padding:var(--space-4) var(--space-6);display:flex;align-items:center;justify-content:space-between;gap:var(--space-4)}
.header-left{display:flex;align-items:center;gap:var(--space-3)}
.logo{display:flex;align-items:center;gap:var(--space-2)}
.logo-icon{width:32px;height:32px;flex-shrink:0}
.logo-text{font-size:var(--text-lg);font-weight:700;line-height:1.2}
.logo-sub{font-size:var(--text-xs);color:var(--color-text-muted);font-weight:400}
.header-right{display:flex;align-items:center;gap:var(--space-3)}
.theme-toggle,.icon-btn{width:36px;height:36px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;color:var(--color-text-muted);transition:background 180ms ease,color 180ms ease}
.theme-toggle:hover,.icon-btn:hover{background:var(--color-surface-offset);color:var(--color-text)}
/* DB status pill */
.db-status{display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-xs);color:var(--color-text-muted);padding:var(--space-1) var(--space-3);border-radius:var(--radius-full);border:1px solid var(--color-border);background:var(--color-surface-2)}
.db-dot{width:7px;height:7px;border-radius:50%;background:var(--color-text-faint);flex-shrink:0;transition:background 300ms}
.db-dot.ok{background:var(--color-success)}
.db-dot.err{background:var(--color-error)}
.db-dot.saving{background:var(--color-gold);animation:pulse 0.8s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
/* Session bar */
.session-bar{background:var(--color-surface);border-bottom:1px solid var(--color-divider);padding:var(--space-2) var(--space-6);display:flex;align-items:center;gap:var(--space-3);flex-wrap:wrap}
.session-label{font-size:var(--text-xs);color:var(--color-text-muted);text-transform:uppercase;letter-spacing:0.06em;flex-shrink:0}
.session-name{font-size:var(--text-sm);font-weight:600;color:var(--color-text)}
.session-meta{font-size:var(--text-xs);color:var(--color-text-faint)}
.session-actions{margin-left:auto;display:flex;gap:var(--space-2)}
.btn-sm{font-size:var(--text-xs);padding:3px var(--space-3);border-radius:var(--radius-full);border:1px solid var(--color-border);color:var(--color-text-muted);transition:all 180ms ease;white-space:nowrap}
.btn-sm:hover{background:var(--color-surface-offset);color:var(--color-text);border-color:var(--color-text-muted)}
.btn-sm.danger:hover{border-color:var(--color-error);color:var(--color-error)}
.btn-sm.primary{background:var(--color-primary);border-color:var(--color-primary);color:#fff}
.btn-sm.primary:hover{background:var(--color-primary-hover)}
main{padding:var(--space-6);max-width:1100px;margin-inline:auto;width:100%}
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--space-3);margin-bottom:var(--space-6)}
.stat-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);padding:var(--space-4) var(--space-5);text-align:center}
.stat-num{font-size:var(--text-xl);font-weight:700;line-height:1;margin-bottom:var(--space-1)}
.stat-label{font-size:var(--text-xs);color:var(--color-text-muted);text-transform:uppercase;letter-spacing:0.05em}
.stat-passed .stat-num{color:var(--color-success)}
.stat-failed .stat-num{color:var(--color-error)}
.stat-pending .stat-num{color:var(--color-gold)}
.progress-wrap{margin-bottom:var(--space-8)}
.progress-label{display:flex;justify-content:space-between;font-size:var(--text-sm);color:var(--color-text-muted);margin-bottom:var(--space-2)}
.progress-bar{height:8px;background:var(--color-surface-offset);border-radius:var(--radius-full);overflow:hidden}
.progress-fill{height:100%;background:var(--color-primary);border-radius:var(--radius-full);transition:width 400ms cubic-bezier(0.16,1,0.3,1)}
.phase-guide{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);padding:var(--space-5);margin-bottom:var(--space-8)}
.phase-guide-title{font-size:var(--text-sm);font-weight:600;color:var(--color-text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:var(--space-4)}
.phases{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:var(--space-3)}
.phase-card{background:var(--color-surface-2);border:1px solid var(--color-divider);border-radius:var(--radius-lg);padding:var(--space-3) var(--space-4)}
.phase-head{display:flex;align-items:center;gap:var(--space-2);margin-bottom:var(--space-1)}
.phase-badge{font-size:var(--text-xs);font-weight:700;background:var(--color-surface-offset);padding:2px var(--space-2);border-radius:var(--radius-full);color:var(--color-text-muted)}
.phase-name{font-size:var(--text-sm);font-weight:600}
.phase-desc{font-size:var(--text-xs);color:var(--color-text-muted);margin-bottom:var(--space-1)}
.phase-time{font-size:var(--text-xs);color:var(--color-text-faint)}
.controls{display:flex;align-items:center;gap:var(--space-3);margin-bottom:var(--space-6);flex-wrap:wrap}
.filter-group{display:flex;gap:var(--space-2)}
.filter-btn{font-size:var(--text-sm);padding:var(--space-2) var(--space-4);border-radius:var(--radius-full);border:1px solid var(--color-border);color:var(--color-text-muted);transition:all 180ms ease}
.filter-btn:hover{background:var(--color-surface-offset);color:var(--color-text)}
.filter-btn.active{background:var(--color-primary);border-color:var(--color-primary);color:#fff}
.controls-right{margin-left:auto;display:flex;gap:var(--space-2)}
.btn-reset{font-size:var(--text-sm);padding:var(--space-2) var(--space-4);border-radius:var(--radius-full);border:1px solid var(--color-border);color:var(--color-text-muted);transition:all 180ms ease}
.btn-reset:hover{border-color:var(--color-error);color:var(--color-error)}
.section-wrap{margin-bottom:var(--space-8)}
.section-header{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3) var(--space-4);background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg);cursor:pointer;user-select:none;margin-bottom:var(--space-2);transition:background 180ms ease}
.section-header:hover{background:var(--color-surface-offset)}
.section-num{font-size:var(--text-xs);font-weight:700;background:var(--color-surface-offset);padding:2px var(--space-2);border-radius:var(--radius-full);color:var(--color-text-muted);flex-shrink:0}
.section-name{font-size:var(--text-base);font-weight:600;flex:1}
.section-count{font-size:var(--text-xs);color:var(--color-text-muted)}
.section-chevron{color:var(--color-text-faint);transition:transform 200ms ease}
.section-wrap.collapsed .section-chevron{transform:rotate(-90deg)}
.section-wrap.collapsed .section-body{display:none}
.section-body{display:flex;flex-direction:column;gap:var(--space-2);padding-left:var(--space-2)}
.test-item{display:flex;align-items:flex-start;gap:var(--space-3);background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:var(--space-3) var(--space-4);transition:border-color 180ms ease}
.test-item:hover{border-color:var(--color-primary)}
.test-id{font-size:var(--text-xs);color:var(--color-text-faint);font-weight:600;min-width:36px;padding-top:2px;flex-shrink:0}
.test-content{flex:1;min-width:0}
.test-title{font-size:var(--text-sm);font-weight:500;margin-bottom:var(--space-1)}
.test-desc{font-size:var(--text-xs);color:var(--color-text-muted);line-height:1.5}
.test-tags{display:flex;gap:var(--space-1);flex-wrap:wrap;margin-top:var(--space-2)}
.tag{font-size:0.65rem;padding:1px 6px;border-radius:var(--radius-full);background:var(--color-surface-offset);color:var(--color-text-muted);font-weight:500;text-transform:uppercase;letter-spacing:0.04em}
.test-actions{display:flex;flex-direction:column;gap:var(--space-1);flex-shrink:0}
.status-btn{font-size:var(--text-xs);padding:var(--space-1) var(--space-3);border-radius:var(--radius-full);border:1px solid var(--color-border);color:var(--color-text-muted);transition:all 180ms ease;white-space:nowrap}
.status-btn.pass{background:color-mix(in oklch,var(--color-success) 12%,transparent);border-color:var(--color-success);color:var(--color-success)}
.status-btn.fail{background:color-mix(in oklch,var(--color-error) 12%,transparent);border-color:var(--color-error);color:var(--color-error)}
.status-btn.skip{background:color-mix(in oklch,var(--color-gold) 12%,transparent);border-color:var(--color-gold);color:var(--color-gold)}
.test-item.status-pass{border-color:color-mix(in oklch,var(--color-success) 40%,transparent)}
.test-item.status-fail{border-color:color-mix(in oklch,var(--color-error) 40%,transparent)}
.test-item.status-skip{border-color:color-mix(in oklch,var(--color-gold) 40%,transparent)}
.test-note{margin-top:var(--space-2);width:100%}
.test-note textarea{width:100%;font-size:var(--text-xs);padding:var(--space-2) var(--space-3);border-radius:var(--radius-sm);border:1px solid var(--color-border);background:var(--color-surface-2);color:var(--color-text);resize:vertical;min-height:60px;font-family:var(--font-body);line-height:1.5;transition:border-color 180ms ease}
.test-note textarea:focus{outline:none;border-color:var(--color-primary)}
/* Sessions modal */
.modal-bg{position:fixed;inset:0;background:oklch(0 0 0/0.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:var(--space-4)}
.modal-bg.hidden{display:none}
.modal{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);padding:var(--space-6);width:100%;max-width:520px;max-height:80vh;display:flex;flex-direction:column;gap:var(--space-4);box-shadow:var(--shadow-md)}
.modal-title{font-size:var(--text-lg);font-weight:700}
.modal-sub{font-size:var(--text-xs);color:var(--color-text-muted)}
.modal-body{overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:var(--space-3)}
.new-session-row{display:flex;gap:var(--space-2)}
.new-session-row input{flex:1;font-size:var(--text-sm);padding:var(--space-2) var(--space-3);border-radius:var(--radius-md);border:1px solid var(--color-border);background:var(--color-surface-2);color:var(--color-text);transition:border-color 180ms ease}
.new-session-row input:focus{outline:none;border-color:var(--color-primary)}
.session-list{display:flex;flex-direction:column;gap:var(--space-2)}
.session-item{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3) var(--space-4);background:var(--color-surface-2);border:1px solid var(--color-divider);border-radius:var(--radius-md);cursor:pointer;transition:border-color 180ms ease}
.session-item:hover{border-color:var(--color-primary)}
.session-item.active{border-color:var(--color-primary);background:color-mix(in oklch,var(--color-primary) 8%,var(--color-surface-2))}
.session-item-info{flex:1;min-width:0}
.session-item-name{font-size:var(--text-sm);font-weight:600}
.session-item-meta{font-size:var(--text-xs);color:var(--color-text-muted)}
.session-item-del{opacity:0;transition:opacity 180ms ease;color:var(--color-error)}
.session-item:hover .session-item-del{opacity:1}
.modal-footer{display:flex;justify-content:flex-end;gap:var(--space-2);border-top:1px solid var(--color-divider);padding-top:var(--space-4)}
.empty{text-align:center;padding:var(--space-16);color:var(--color-text-muted)}
.empty svg{margin:0 auto var(--space-4);color:var(--color-text-faint)}
/* Toast */
.toast-wrap{position:fixed;bottom:var(--space-6);right:var(--space-6);z-index:300;display:flex;flex-direction:column;gap:var(--space-2);pointer-events:none}
.toast{font-size:var(--text-xs);padding:var(--space-2) var(--space-4);border-radius:var(--radius-full);background:var(--color-text);color:var(--color-bg);box-shadow:var(--shadow-md);opacity:0;transform:translateY(8px);transition:opacity 200ms ease,transform 200ms ease;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
@media(max-width:640px){
  .stats-bar{grid-template-columns:repeat(2,1fr)}
  .phases{grid-template-columns:1fr}
  header{padding:var(--space-3) var(--space-4)}
  main{padding:var(--space-4)}
  .session-bar{padding:var(--space-2) var(--space-4)}
  .db-status span{display:none}
}
</style>
</head>
<body>
<div class="app">
<header>
  <div class="header-left">
    <div class="logo">
      <svg class="logo-icon" viewBox="0 0 32 32" fill="none" aria-label="Bird Hunter QA" xmlns="http://www.w3.org/2000/svg">
        <circle cx="16" cy="16" r="15" stroke="currentColor" stroke-width="1.5" opacity="0.2"/>
        <path d="M8 20 C10 14 14 10 20 9 L23 8 L22 11 C20 17 16 20 10 22 Z" fill="currentColor" opacity="0.8"/>
        <circle cx="21" cy="9" r="1.5" fill="var(--color-primary)"/>
        <path d="M16 24 L18 20 M14 23 L16 19" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
        <circle cx="16" cy="16" r="1" fill="var(--color-primary)" opacity="0.6"/>
        <circle cx="16" cy="16" r="6" stroke="var(--color-primary)" stroke-width="0.75" stroke-dasharray="2 3" opacity="0.4"/>
      </svg>
      <div>
        <div class="logo-text">Bird Hunter</div>
        <div class="logo-sub">QA Checklist</div>
      </div>
    </div>
  </div>
  <div class="header-right">
    <div class="db-status" title="IndexedDB storage status">
      <span class="db-dot" id="db-dot"></span>
      <span id="db-status-text">DB</span>
    </div>
    <button class="theme-toggle" data-theme-toggle aria-label="Toggle theme">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>
</header>

<div class="session-bar">
  <span class="session-label">Session</span>
  <span class="session-name" id="session-name-display">Loading…</span>
  <span class="session-meta" id="session-meta"></span>
  <div class="session-actions">
    <button class="btn-sm" id="btn-sessions">⊞ Sessions</button>
    <button class="btn-sm" id="btn-export">↓ Export JSON</button>
    <button class="btn-sm" id="btn-import-wrap">↑ Import JSON</button>
    <input type="file" id="import-file" accept=".json" style="display:none">
  </div>
</div>

<main>
  <div class="stats-bar">
    <div class="stat-card stat-passed"><div class="stat-num" id="cnt-pass">0</div><div class="stat-label">Passed</div></div>
    <div class="stat-card stat-failed"><div class="stat-num" id="cnt-fail">0</div><div class="stat-label">Failed</div></div>
    <div class="stat-card stat-pending"><div class="stat-num" id="cnt-skip">0</div><div class="stat-label">Pending</div></div>
    <div class="stat-card"><div class="stat-num" id="cnt-total">0</div><div class="stat-label">Total</div></div>
  </div>
  <div class="progress-wrap">
    <div class="progress-label"><span>Progress</span><span id="pct-label">0% complete</span></div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <div class="phase-guide">
    <div class="phase-guide-title">Suggested Test Pass Order — ~2 hours total</div>
    <div class="phases" id="phases-container"></div>
  </div>
  <div class="controls">
    <div class="filter-group">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="pending">Pending</button>
      <button class="filter-btn" data-filter="pass">Passed</button>
      <button class="filter-btn" data-filter="fail">Failed</button>
    </div>
    <div class="controls-right">
      <button class="btn-reset" id="btn-reset">Reset All</button>
    </div>
  </div>
  <div id="checklist-root"></div>
</main>
</div>

<!-- Sessions modal -->
<div class="modal-bg hidden" id="modal-bg">
  <div class="modal" role="dialog" aria-modal="true" aria-label="QA Sessions">
    <div>
      <div class="modal-title">QA Sessions</div>
      <div class="modal-sub">Each session stores its own test states and notes in IndexedDB.</div>
    </div>
    <div class="modal-body">
      <div class="new-session-row">
        <input type="text" id="new-session-input" placeholder="New session name, e.g. v1.2 Smoke Test" maxlength="60">
        <button class="btn-sm primary" id="btn-create-session">+ Create</button>
      </div>
      <div class="session-list" id="session-list"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-sm" id="btn-close-modal">Close</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-wrap"><div class="toast" id="toast"></div></div>

<script>
/* ─── DATA ─────────────────────────────────────────────── */
const PHASES=[
  {n:"Phase 1",icon:"🚀",name:"Smoke Test",ids:"1.1–1.3·2.1·3.1·5.1·6.1·9.1",desc:"Confirm nothing catastrophically broken",time:"10 min"},
  {n:"Phase 2",icon:"🎮",name:"Core Loop",ids:"Sections 2,3,6,9",desc:"Main gameplay experience end-to-end",time:"30 min"},
  {n:"Phase 3",icon:"✨",name:"Variety",ids:"Section 5·8",desc:"Feel & polish",time:"20 min"},
  {n:"Phase 4",icon:"📊",name:"Difficulty",ids:"Sections 1,10",desc:"Playtest curve & fairness tuning",time:"30 min"},
  {n:"Phase 5",icon:"🐛",name:"Edge & Regression",ids:"Sections 14,15",desc:"Bug-fix verification",time:"20 min"},
  {n:"Phase 6",icon:"⚡",name:"Performance",ids:"Section 16",desc:"FPS, memory, UI responsiveness",time:"15 min"},
  {n:"Phase 7",icon:"👾",name:"Bosses",ids:"Section 11",desc:"Boss phases & TTK bypass",time:"10 min"},
];
const SECTIONS=[
  {id:1,name:"Difficulty Curve & Progression",tests:[

/* ─── IndexedDB ─────────────────────────────────────────── */
const DB_NAME='BirdHunterQA', DB_VER=1;
const STORE_SESSIONS='sessions', STORE_TESTS='tests';
let db=null;

function openDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains(STORE_SESSIONS)){
        const s=d.createObjectStore(STORE_SESSIONS,{keyPath:'id',autoIncrement:true});
        s.createIndex('name','name',{unique:false});
      }
      if(!d.objectStoreNames.contains(STORE_TESTS)){
        const t=d.createObjectStore(STORE_TESTS,{keyPath:'key'});
        t.createIndex('sessionId','sessionId',{unique:false});
      }
    };
    req.onsuccess=e=>{db=e.target.result;res(db);};
    req.onerror=e=>rej(e.target.error);
  });
}

function tx(storeName,mode='readonly'){
  return db.transaction(storeName,mode).objectStore(storeName);
}
function idbGet(store,key){return new Promise((r,e)=>{const q=tx(store).get(key);q.onsuccess=()=>r(q.result);q.onerror=e;});}
function idbPut(store,val){return new Promise((r,e)=>{const q=tx(store,'readwrite').put(val);q.onsuccess=()=>r(q.result);q.onerror=e;});}
function idbDel(store,key){return new Promise((r,e)=>{const q=tx(store,'readwrite').delete(key);q.onsuccess=()=>r();q.onerror=e;});}
function idbGetAll(store){return new Promise((r,e)=>{const q=tx(store).getAll();q.onsuccess=()=>r(q.result);q.onerror=e;});}
function idbGetAllByIndex(store,idx,val){
  return new Promise((r,e)=>{
    const q=tx(store).index(idx).getAll(val);
    q.onsuccess=()=>r(q.result);
    q.onerror=e;
  });
}
function idbClearByIndex(store,idx,val){
  return new Promise((r,e)=>{
    const s=tx(store,'readwrite');
    const q=s.index(idx).openCursor(IDBKeyRange.only(val));
    q.onsuccess=ev=>{
      const cur=ev.target.result;
      if(cur){cur.delete();cur.continue();}else r();
    };
    q.onerror=e;
  });
}

/* ─── STATE ─────────────────────────────────────────────── */
let state={}; // {testId:{status,note}}
let currentSession=null; // {id,name,createdAt,updatedAt}
let saveTimer=null;
let filter='all';

function dbDot(mode){
  const dot=document.getElementById('db-dot');
  const txt=document.getElementById('db-status-text');
  dot.className='db-dot '+mode;
  if(mode==='ok') txt.textContent='Saved';
  else if(mode==='saving') txt.textContent='Saving…';
  else if(mode==='err') txt.textContent='DB Error';
  else txt.textContent='DB';
}

function schedSave(){
  dbDot('saving');
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>persistState(),600);
}

async function persistState(){
  if(!db||!currentSession) return;
  try{
    const now=new Date().toISOString();
    currentSession.updatedAt=now;
    await idbPut(STORE_SESSIONS,currentSession);
    const all=Object.entries(state).map(([testId,v])=>({
      key:`${currentSession.id}::${testId}`,
      sessionId:currentSession.id,
      testId,
      status:v.status||'none',
      note:v.note||'',
      updatedAt:now
    }));
    for(const rec of all) await idbPut(STORE_TESTS,rec);
    updateSessionMeta();
    dbDot('ok');
  }catch(err){
    console.error('IDB save error',err);
    dbDot('err');
  }
}

async function loadSession(session){
  currentSession=session;
  state={};
  const records=await idbGetAllByIndex(STORE_TESTS,'sessionId',session.id);
  records.forEach(r=>{
    state[r.testId]={status:r.status||'none',note:r.note||''};
  });
  document.getElementById('session-name-display').textContent=session.name;
  updateSessionMeta();
  renderAll();
  updateStats();
  dbDot('ok');
}

function updateSessionMeta(){
  if(!currentSession) return;
  const d=new Date(currentSession.updatedAt||currentSession.createdAt);
  document.getElementById('session-meta').textContent=
    'Last saved '+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}

async function createSession(name){
  const now=new Date().toISOString();
  const id=await idbPut(STORE_SESSIONS,{name,createdAt:now,updatedAt:now});
  const session={id,name,createdAt:now,updatedAt:now};
  return session;
}

async function deleteSession(id){
  await idbDel(STORE_SESSIONS,id);
  await idbClearByIndex(STORE_TESTS,'sessionId',id);
}

/* ─── INIT ──────────────────────────────────────────────── */
async function init(){
  try{
    await openDB();
    dbDot('ok');
    let sessions=await idbGetAll(STORE_SESSIONS);
    if(sessions.length===0){
      const s=await createSession('Default Session');
      sessions=[s];
    }
    await loadSession(sessions[sessions.length-1]);
  }catch(e){
    console.error('DB init failed',e);
    dbDot('err');
    document.getElementById('session-name-display').textContent='Default (no DB)';
    renderAll();
    updateStats();
  }
}

/* ─── APP LOGIC ─────────────────────────────────────────── */
function getStatus(id){return state[id]?.status||'none';}
function getNote(id){return state[id]?.note||'';}

function updateStats(){
  let pass=0,fail=0,skip=0,total=0;
  SECTIONS.forEach(s=>s.tests.forEach(t=>{
    total++;
    const st=getStatus(t.id);
    if(st==='pass') pass++;
    else if(st==='fail') fail++;
    else if(st==='skip') skip++;
  }));
  document.getElementById('cnt-pass').textContent=pass;
  document.getElementById('cnt-fail').textContent=fail;
  document.getElementById('cnt-skip').textContent=skip;
  document.getElementById('cnt-total').textContent=total;
  const pct=total>0?Math.round((pass/total)*100):0;
  document.getElementById('pct-label').textContent=pct+'% complete';
  document.getElementById('prog-fill').style.width=pct+'%';
}

function setStatus(id,status){
  if(!state[id]) state[id]={};
  state[id].status=(state[id].status===status)?'none':status;
  renderAll();
  updateStats();
  schedSave();
}

function setNote(id,note){
  if(!state[id]) state[id]={};
  state[id].note=note;
  schedSave();
}

function renderPhases(){
  document.getElementById('phases-container').innerHTML=PHASES.map(p=>`
    <div class="phase-card">
      <div class="phase-head"><span class="phase-badge">${p.n}</span><span>${p.icon}</span><span class="phase-name">${p.name}</span></div>
      <div class="phase-desc">${p.desc}</div>
      <div class="phase-time">⏱ ${p.time}</div>
    </div>`).join('');
}

        <span class="section-num">§${sec.id}</span>
        <span class="section-name">${sec.name}</span>
        <span class="section-count">${visible.length} test${visible.length!==1?'s':''}</span>
        <svg class="section-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="section-body">${visible.map(t=>{
        const st=getStatus(t.id);
        return `<div class="test-item${st!=='none'?' status-'+st:''}">
          <div class="test-id">${t.id}</div>
          <div class="test-content">
            <div class="test-title">${t.title}</div>
            <div class="test-desc">${t.desc}</div>

            <div class="test-note"><textarea placeholder="Add notes…" rows="2" onchange="setNote('${t.id}',this.value)">${getNote(t.id)}</textarea></div>
          </div>
          <div class="test-actions">
            <button class="status-btn pass${st==='pass'?' active':''}" onclick="setStatus('${t.id}','pass')">✓ Pass</button>
            <button class="status-btn fail${st==='fail'?' active':''}" onclick="setStatus('${t.id}','fail')">✗ Fail</button>
            <button class="status-btn skip${st==='skip'?' active':''}" onclick="setStatus('${t.id}','skip')">⏸ Skip</button>
          </div>
        </div>`;
      }).join('')}</div>
    </div>`;
  });
  if(!html) html=`<div class="empty"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg><p>No tests match this filter.</p></div>`;
  root.innerHTML=html;
}

function toggleSection(id){document.getElementById('sec-'+id).classList.toggle('collapsed');}

/* ─── SESSIONS MODAL ────────────────────────────────────── */
async function openModal(){
  document.getElementById('modal-bg').classList.remove('hidden');
  await refreshSessionList();
}
function closeModal(){document.getElementById('modal-bg').classList.add('hidden');}

async function refreshSessionList(){
  const sessions=await idbGetAll(STORE_SESSIONS);
  const el=document.getElementById('session-list');
  if(!sessions.length){el.innerHTML='<p style="color:var(--color-text-muted);font-size:var(--text-xs)">No sessions yet.</p>';return;}
  el.innerHTML=sessions.map(s=>`
    <div class="session-item${currentSession&&s.id===currentSession.id?' active':''}" onclick="switchSession(${s.id})">
      <div class="session-item-info">
        <div class="session-item-name">${s.name}</div>
        <div class="session-item-meta">Created ${new Date(s.createdAt).toLocaleDateString()} · Updated ${new Date(s.updatedAt).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>
      </div>
      <button class="session-item-del btn-sm danger" onclick="event.stopPropagation();removeSession(${s.id})" title="Delete session">✕</button>
    </div>`).join('');
}

async function switchSession(id){
  const sessions=await idbGetAll(STORE_SESSIONS);
  const s=sessions.find(x=>x.id===id);
  if(s){await loadSession(s);closeModal();showToast('Loaded session: '+s.name);}
}

async function removeSession(id){
  if(!confirm('Delete this session and all its test data?')) return;
  if(currentSession&&currentSession.id===id){
    showToast('Cannot delete the active session.','err');return;
  }
  await deleteSession(id);
  await refreshSessionList();
  showToast('Session deleted.');
}

/* ─── EXPORT / IMPORT ───────────────────────────────────── */
function exportJSON(){
  const data={session:currentSession,state,exportedAt:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`qa-${(currentSession?.name||'session').replace(/\s+/g,'-')}-${Date.now()}.json`;
  a.click();
  showToast('Exported JSON.');
}

async function importJSON(file){
  try{
    const text=await file.text();
    const data=JSON.parse(text);
    if(!data.state||typeof data.state!=='object') throw new Error('Invalid format');
    const name=(data.session?.name||file.name.replace('.json',''))+' (imported)';
    const s=await createSession(name);
    await loadSession(s);
    state={...data.state};
    await persistState();
    renderAll();
    updateStats();
    showToast('Imported: '+name);
  }catch(e){
    showToast('Import failed: '+e.message,'err');
  }
}

/* ─── TOAST ─────────────────────────────────────────────── */
let toastTimer=null;
function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.background=type==='err'?'var(--color-error)':'var(--color-text)';
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2500);
}

/* ─── EVENT LISTENERS ───────────────────────────────────── */
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    filter=btn.dataset.filter;
    renderAll();
  });
});

document.getElementById('btn-reset').addEventListener('click',()=>{
  if(!confirm('Reset all test statuses and notes for this session?')) return;
  Object.keys(state).forEach(k=>delete state[k]);
  renderAll();
  updateStats();
  schedSave();
  showToast('Session reset.');
});

document.getElementById('btn-sessions').addEventListener('click',openModal);
document.getElementById('btn-close-modal').addEventListener('click',closeModal);
document.getElementById('modal-bg').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});

document.getElementById('btn-create-session').addEventListener('click',async()=>{
  const input=document.getElementById('new-session-input');
  const name=input.value.trim();
  if(!name){showToast('Enter a session name.','err');return;}
  const s=await createSession(name);
  await loadSession(s);
  input.value='';
  await refreshSessionList();
  showToast('Session created: '+name);
});

document.getElementById('btn-export').addEventListener('click',exportJSON);
document.getElementById('btn-import-wrap').addEventListener('click',()=>document.getElementById('import-file').click());
document.getElementById('import-file').addEventListener('change',e=>{if(e.target.files[0])importJSON(e.target.files[0]);});

/* Theme toggle */
(function(){
  const t=document.querySelector('[data-theme-toggle]'),r=document.documentElement;
  let d=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
  r.setAttribute('data-theme',d);
  t&&t.addEventListener('click',()=>{
    d=d==='dark'?'light':'dark';
    r.setAttribute('data-theme',d);
    t.innerHTML=d==='dark'?'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>':'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  });
})();

renderPhases();
init();
</script>
</body>
